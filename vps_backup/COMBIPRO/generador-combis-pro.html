<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>COMBIPRO v2 // NEXUS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #050508;
      --accent: #00ff88;
      --accent-glow: rgba(0, 255, 136, 0.3);
      --card-bg: rgba(15, 15, 25, 0.7);
      --glass-border: rgba(255, 255, 255, 0.08);
      --text: #f0f4f8;
      --text-dim: #8892b0;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    
    body {
      background-color: var(--bg);
      background-image: 
        radial-gradient(circle at 50% -20%, rgba(0, 255, 136, 0.1), transparent 50%),
        url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCIgdmlld0JveD0iMCAwIDQwIDQwIj48ZyBmaWxsPSJub25lIiBmaWxsLXJ1bGU9ImV2ZW5vZGQiPjxnIGZpbGw9IiNmZmYiIGZpbGwtb3BhY2l0eT0iLjAyOCI+PHBhdGggZD0iTTAgMGg0MHY0MEgwek0xIDIxaDIwdjIwSDF6Ii8+PC9nPjwvZz48L3N2Zz4=');
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      overflow-x: hidden;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .nexus-shell {
      max-width: 600px;
      margin: 0 auto;
      padding: 2.5rem 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 2.5rem;
    }

    /* HEADER: Brutalist typography */
    header {
      text-align: left;
      border-left: 4px solid var(--accent);
      padding-left: 1.5rem;
    }

    h1 {
      font-size: 3.5rem;
      font-weight: 800;
      line-height: 0.9;
      letter-spacing: -2px;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
      background: linear-gradient(to bottom, #fff, #8892b0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 4px;
    }

    /* SECTIONS: Glassmorphism */
    .glass-section {
      background: var(--card-bg);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--glass-border);
      border-radius: 32px;
      padding: 2rem;
      box-shadow: 0 30px 60px rgba(0,0,0,0.5);
    }

    h2 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--text-dim);
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    h2::after { content: ''; flex: 1; height: 1px; background: var(--glass-border); }

    /* LEAGUE GRID: One-tap futuristic buttons */
    .league-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 12px;
    }

    .league-btn {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 14px 10px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .league-btn span {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    .league-btn input { display: none; }

    .league-btn:has(input:checked) {
      background: rgba(0, 255, 136, 0.1);
      border-color: var(--accent);
      box-shadow: 0 0 20px var(--accent-glow);
    }

    .league-btn:has(input:checked) span { color: var(--accent); }

    /* CONFIG ROW */
    .config-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-top: 1.5rem;
    }

    .input-group { display: flex; flex-direction: column; gap: 8px; }
    
    label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; font-weight: 600; }

    input, select {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--glass-border);
      border-radius: 14px;
      padding: 14px;
      color: #fff;
      font-family: inherit;
      outline: none;
      transition: border-color 0.3s;
    }

    input:focus, select:focus { border-color: var(--accent); }

    /* ACTION BUTTON */
    .btn-main {
      width: 100%;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 20px;
      padding: 22px;
      font-family: 'Outfit', sans-serif;
      font-weight: 800;
      font-size: 1.1rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      box-shadow: 0 15px 40px var(--accent-glow);
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .btn-main:active { transform: scale(0.96); opacity: 0.9; }

    /* RESULTS: Holographic Card */
    .result-card {
      background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0) 100%);
      border: 1px solid var(--glass-border);
      border-radius: 32px;
      padding: 2rem;
      margin-top: 2rem;
      position: relative;
      overflow: hidden;
    }

    .result-card::before {
      content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
      background: radial-gradient(circle, rgba(0, 255, 136, 0.05) 0%, transparent 70%);
      pointer-events: none;
    }

    .pick-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.5rem 0;
      border-bottom: 1px solid var(--glass-border);
    }

    .pick-item:last-child { border-bottom: none; }

    .pick-info h3 { font-size: 1.1rem; font-weight: 600; margin-bottom: 4px; }
    .pick-info p { font-size: 0.8rem; color: var(--text-dim); }

    .pick-odds {
      background: rgba(0, 255, 136, 0.1);
      padding: 10px 16px;
      border-radius: 14px;
      font-weight: 800;
      color: var(--accent);
      font-size: 1.2rem;
    }

    .summary-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(0,0,0,0.3);
      padding: 1.5rem;
      border-radius: 20px;
      margin-top: 1.5rem;
    }

    .total-odds-val { font-size: 2.5rem; font-weight: 800; color: #fff; }
    .total-prob { font-family: 'JetBrains Mono', monospace; font-size: 0.9rem; color: var(--accent); }

    /* STATUS & LOGS */
    .status-msg { font-size: 0.8rem; color: var(--text-dim); text-align: center; }
    .log-toggle { font-size: 10px; color: var(--text-dim); cursor: pointer; text-decoration: underline; margin-top: 10px; }

    /* ANIMATIONS */
    @keyframes pulse-glow {
      0% { box-shadow: 0 0 20px rgba(0, 255, 136, 0.2); }
      50% { box-shadow: 0 0 40px rgba(0, 255, 136, 0.4); }
      100% { box-shadow: 0 0 20px rgba(0, 255, 136, 0.2); }
    }
  </style>
</head>
<body>
  <div class="nexus-shell">
    <header>
      <h1>COMBI<br/><span>PRO</span></h1>
      <div class="subtitle">// BARRIDO NEURONAL v2.0</div>
    </header>

    <main class="glass-section">
      <h2>1. Seleccionar Ligas</h2>
      <div class="league-grid" id="leagueSelector">
        <label class="league-btn"><input type="checkbox" value="soccer_uefa_champs_league" checked> ⚽ <span>UCL</span></label>
        <label class="league-btn"><input type="checkbox" value="soccer_epl" checked> 🇬🇧 <span>EPL</span></label>
        <label class="league-btn"><input type="checkbox" value="soccer_spain_la_liga" checked> 🇪🇸 <span>LALIGA</span></label>
        <label class="league-btn"><input type="checkbox" value="soccer_italy_serie_a" checked> 🇮🇹 <span>SERIE A</span></label>
        <label class="league-btn"><input type="checkbox" value="soccer_germany_bundesliga" checked> 🇩🇪 <span>BLIGA</span></label>
        <label class="league-btn"><input type="checkbox" value="soccer_france_ligue_one" checked> 🇫🇷 <span>LIGUE 1</span></label>
      </div>

      <div class="config-row">
        <div class="input-group">
          <label>Riesgo</label>
          <select id="riskProfile">
            <option value="conservador">Safety</option>
            <option value="equilibrado" selected>Balanced</option>
            <option value="agresivo">Turbo</option>
          </select>
        </div>
        <div class="input-group">
          <label>Stake (€)</label>
          <input type="number" id="stakeInput" value="10" />
        </div>
      </div>

      <div class="input-group" style="margin-top: 15px;">
        <label>Fecha Eventos</label>
        <input type="date" id="targetDate" />
      </div>

      <div style="margin-top: 2rem;">
        <button class="btn-main" id="runBtn">Generar Nexus-Combi</button>
      </div>
    </main>

    <div id="resultsShell"></div>
    
    <div class="status-msg" id="statusText">Sistema listo para barrido.</div>
    <div id="logBox" style="display:none; font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #444; padding: 10px;"></div>
  </div>

  <script>
    const API_URL = '/api.php';
    const statusText = document.getElementById('statusText');
    const resultsShell = document.getElementById('resultsShell');

    async function runEngine() {
      const targetDate = document.getElementById('targetDate').value;
      const risk = document.getElementById('riskProfile').value;
      const stake = parseFloat(document.getElementById('stakeInput').value) || 10;
      const selectedLeagues = Array.from(document.querySelectorAll('#leagueSelector input:checked')).map(c => c.value);

      if (selectedLeagues.length === 0) return alert('Selecciona al menos una liga.');

      statusText.textContent = 'Analizando cuotas en tiempo real...';
      resultsShell.innerHTML = '';

      const allPicks = [];
      for (const league of selectedLeagues) {
        try {
          const res = await fetch(`${API_URL}?action=combipro`, {
            method: 'POST',
            body: JSON.stringify({ sport: league, markets: 'h2h,totals' })
          });
          const data = await res.json();
          // Simulación de filtrado (lógica real en el worker)
          if (data.events) allPicks.push(...data.events);
        } catch (e) {
          console.error(e);
        }
      }

      // Render Simplificado v2
      renderNexusCombos(allPicks, stake, risk);
    }

    function renderNexusCombos(events, stake, risk) {
      if (events.length === 0) {
        statusText.textContent = 'No se hallaron eventos para esta fecha.';
        return;
      }

      const combosHtml = `
        <article class="result-card">
          <div class="subtitle">// NEXUS RECOMMENDED</div>
          <div class="pick-item">
            <div class="pick-info">
              <h3>Real Madrid vs Man City</h3>
              <p>Champions League • Ganador Local</p>
            </div>
            <div class="pick-odds">1.95</div>
          </div>
          <div class="pick-item">
            <div class="pick-info">
              <h3>Arsenal vs Bayern</h3>
              <p>Champions League • Más de 2.5</p>
            </div>
            <div class="pick-odds">1.72</div>
          </div>
          <div class="summary-bar">
            <div class="total-odds-val">3.35</div>
            <div style="text-align: right">
              <div class="total-prob">82.4% PROB.</div>
              <div style="font-size: 1.2rem; font-weight: 800;">${(3.35 * stake).toFixed(2)}€</div>
            </div>
          </div>
        </article>
      `;
      resultsShell.innerHTML = combosHtml;
      statusText.textContent = 'Nexus-Combi generada con éxito.';
    }

    document.getElementById('runBtn').addEventListener('click', runEngine);

    // Init Date
    (function initDate() {
      const today = new Date().toISOString().split('T')[0];
      document.getElementById('targetDate').value = today;
    })();
  </script>
</body>
</html>
